<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1f26">
<title>기사콜</title>
<style>
  :root{
    --bg:#1c1f26;
    --bg2:#151820;
    --card:#232733;
    --gold:#c9a227;
    --gold2:#e6be3f;
    --red:#8f2f38;
    --red2:#c0392f;
    --blue:#2f5d8f;
    --purple:#5a3f7a;
    --text:#e8e6df;
    --muted:#8a8f9c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% -10%, #262b38 0%, rgba(38,43,56,0) 60%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    position:relative;
    overflow-x:hidden;
  }
  /* 미세 노이즈 텍스처 */
  body::before{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .wrap{
    position:relative;z-index:1;
    min-height:100dvh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));
    gap:18px;
  }
  .screen{width:100%;max-width:440px;display:none;flex-direction:column;gap:16px;}
  .screen.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .genderRow{display:flex;flex-direction:column;gap:14px;}
  .btn{
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    color:var(--text);
    font-size:22px;font-weight:700;letter-spacing:.02em;
    padding:28px 16px;
    cursor:pointer;
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:12px;
    transition:transform .08s ease, box-shadow .2s ease, filter .2s ease;
    box-shadow:0 8px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .btn:active{transform:scale(.97);}
  .btn .ico{font-size:30px;line-height:1;}
  .btn.man{
    background:linear-gradient(160deg,#2f5d8f 0%,#213f5f 55%,#1a2a3e 100%);
    border-color:rgba(201,162,39,.35);
  }
  .btn.woman{
    background:linear-gradient(160deg,#7a2f4a 0%,#5a3f7a 55%,#3a2450 100%);
    border-color:rgba(192,57,47,.4);
  }

  .callBtn{
    width:100%;
    border:1px solid rgba(201,162,39,.5);
    border-radius:20px;
    background:linear-gradient(160deg,#2a2f3d 0%,#20242f 100%);
    color:var(--text);
    font-size:24px;font-weight:800;line-height:1.4;letter-spacing:.02em;
    padding:34px 20px;
    cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .08s ease;
  }
  .callBtn:active{transform:scale(.98);}
  .callBtn .k{color:var(--gold2);}
  .link{
    background:none;border:none;color:var(--muted);font-size:13px;
    text-decoration:underline;cursor:pointer;padding:6px;
  }

  /* 알림 오버레이 */
  .alert{
    position:fixed;inset:0;z-index:50;
    display:none;align-items:center;justify-content:center;
    padding:24px;
    background:radial-gradient(circle at 50% 40%, rgba(143,47,56,.55), rgba(0,0,0,.9));
    backdrop-filter:blur(2px);
  }
  .alert.show{display:flex;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;}to{opacity:1;}}
  .alertCard{
    text-align:center;max-width:420px;
  }
  .siren{
    font-size:72px;line-height:1;margin-bottom:10px;
    animation:shake .5s ease infinite;
  }
  @keyframes shake{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.12);}}
  .alertCard h2{
    margin:0 0 6px;font-size:38px;font-weight:900;letter-spacing:.02em;
    color:var(--gold2);text-shadow:0 3px 14px rgba(0,0,0,.7);
    animation:pulse 1s ease infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .alertCard .cart{font-size:60px;font-weight:900;color:var(--red2);margin:6px 0;}
  .thanks{
    margin:14px 0 24px;font-size:24px;font-weight:800;color:#fff;line-height:1.4;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .closeBtn{
    border:1px solid rgba(201,162,39,.5);border-radius:14px;
    background:linear-gradient(160deg,#c9a227,#a5851d);
    color:#1c1f26;font-weight:800;font-size:16px;letter-spacing:.05em;
    padding:14px 34px;cursor:pointer;
  }
  /* 어르신용 큼직한 종료 버튼 */
  .exitBtn{
    display:block;width:100%;max-width:360px;margin:22px auto 0;
    border:2px solid rgba(192,57,47,.7);border-radius:20px;
    background:linear-gradient(160deg,#c0392f 0%,#8f2f38 100%);
    color:#fff;font-weight:900;font-size:30px;letter-spacing:.04em;
    padding:32px 20px;cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s ease;
  }
  .exitBtn:active{transform:scale(.98);}
  /* 종료 안내 폴백 오버레이 */
  .goodbye{
    position:fixed;inset:0;z-index:80;
    display:none;align-items:center;justify-content:center;text-align:center;
    padding:28px;background:#0b0c10;
  }
  .goodbye.show{display:flex;}
  .goodbye .gbInner{max-width:520px;}
  .goodbye .gbIco{font-size:70px;line-height:1;margin-bottom:16px;}
  .goodbye h2{
    margin:0;color:var(--gold2);font-weight:900;line-height:1.5;
    font-size:clamp(30px,8vw,46px);letter-spacing:.02em;
    text-shadow:0 3px 14px rgba(0,0,0,.7);
  }
  .goodbye p{margin:18px 0 0;color:#cfd3dc;font-size:clamp(20px,5vw,28px);font-weight:700;line-height:1.5;}
</style>

<div class="wrap">

  <!-- 1) 성별 선택 화면 -->
  <section id="화면_성별" class="screen active">
    <div class="genderRow">
      <button class="btn man" onclick="성별선택()">
        <span class="ico">♂</span>
        <span>저는 남자 입니다</span>
      </button>
      <button class="btn woman" onclick="성별선택()">
        <span class="ico">♀</span>
        <span>저는 여자입니다</span>
      </button>
    </div>
  </section>

  <!-- 2) 물량 패널 화면 -->
  <section id="화면_물량" class="screen">
    <button class="callBtn" onclick="물량알림()">
      기사님 오늘 <span class="k">15카트</span>넘어요!
    </button>
    <button class="link" onclick="처음으로()">← 다시 선택</button>
  </section>
</div>

<!-- 알림 오버레이 -->
<div id="알림" class="alert" onclick="알림닫기(event)">
  <div class="alertCard">
    <div class="siren">🚨</div>
    <h2>물량 폭주!</h2>
    <div class="cart">15카트 ↑</div>
    <div class="thanks">감사합니다 오늘 빨리가겠습니다!</div>
    <button class="closeBtn" onclick="알림닫기()">확인</button>
    <button class="exitBtn" onclick="앱종료()">종료하기</button>
  </div>
</div>

<!-- 종료 안내 폴백 오버레이 -->
<div id="종료안내" class="goodbye">
  <div class="gbInner">
    <div class="gbIco">👋</div>
    <h2>앱을 종료했습니다.<br>창을 닫아주세요.</h2>
    <p>오늘도 안전운행 하세요, 기사님!</p>
  </div>
</div>

<script>
  function 보이기(id){
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
    document.getElementById(id).classList.add('active');
  }
  function 성별선택(){
    보이기('화면_물량');
  }
  function 처음으로(){
    보이기('화면_성별');
  }
  function 물량알림(){
    var a = document.getElementById('알림');
    a.classList.add('show');
    if (navigator.vibrate) { try { navigator.vibrate([120,60,120]); } catch(e){} }
  }
  function 알림닫기(e){
    if (e && e.target && e.target.id !== '알림' && !e.target.classList.contains('closeBtn')) return;
    document.getElementById('알림').classList.remove('show');
  }
  function 앱종료(){
    // 1) 스크립트로 연 창이면 닫기 시도
    try { window.open('', '_self'); window.close(); } catch(e){}
    try { window.close(); } catch(e){}
    // 2) 안 닫히면(대부분의 브라우저) 폴백: 큰 안내 오버레이 표시
    setTimeout(function(){
      document.getElementById('종료안내').classList.add('show');
    }, 250);
  }
</script>
