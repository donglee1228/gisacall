<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1c1f26">
<title>기사콜</title>
<!-- PWA: "홈 화면에 추가" 후 그 아이콘으로 실행하면 주소창 없이 전체화면 앱처럼 실행됨 -->
<!-- 아이콘 경로는 iOS 호환을 위해 쿼리스트링 없는 순수 ASCII 파일명 사용(캐시 무력화는 서비스워커 버전+새 파일 URL로 처리) -->
<link rel="manifest" href="앱설정.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="기사콜">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="shortcut icon" type="image/png" href="favicon.png">
<style>
  :root{
    --bg:#1c1f26;
    --bg2:#151820;
    --card:#232733;
    --gold:#c9a227;
    --gold2:#e6be3f;
    --red:#8f2f38;
    --red2:#c0392f;
    --blue:#2f5d8f;
    --purple:#5a3f7a;
    --text:#e8e6df;
    --muted:#8a8f9c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% -10%, #262b38 0%, rgba(38,43,56,0) 60%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    position:relative;
    overflow-x:hidden;
  }
  /* 미세 노이즈 텍스처 */
  body::before{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.07;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .wrap{
    position:relative;z-index:1;
    min-height:100dvh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    gap:18px;
  }
  .screen{width:100%;max-width:440px;display:none;flex-direction:column;gap:16px;}
  .screen.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .genderRow{display:flex;flex-direction:column;gap:14px;}
  .btn{
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    color:var(--text);
    font-size:22px;font-weight:700;letter-spacing:.02em;
    padding:28px 16px;
    cursor:pointer;
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:12px;
    transition:transform .08s ease, box-shadow .2s ease, filter .2s ease;
    box-shadow:0 8px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .btn:active{transform:scale(.97);}
  .btn .ico{font-size:30px;line-height:1;}
  .btn.man{
    background:linear-gradient(160deg,#2f5d8f 0%,#213f5f 55%,#1a2a3e 100%);
    border-color:rgba(201,162,39,.35);
  }
  .btn.woman{
    background:linear-gradient(160deg,#7a2f4a 0%,#5a3f7a 55%,#3a2450 100%);
    border-color:rgba(192,57,47,.4);
  }

  .callBtn{
    width:100%;
    border:1px solid rgba(201,162,39,.5);
    border-radius:20px;
    background:linear-gradient(160deg,#2a2f3d 0%,#20242f 100%);
    color:var(--text);
    font-size:24px;font-weight:800;line-height:1.4;letter-spacing:.02em;
    padding:24px 20px;
    cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .08s ease;
  }
  .callBtn:active{transform:scale(.98);}
  .callBtn .k{color:var(--gold2);}
  .link{
    background:none;border:none;color:var(--muted);font-size:13px;
    text-decoration:underline;cursor:pointer;padding:6px;
  }

  /* 알림 오버레이 (세로 스크롤 가능 · 절대 잘리지 않게) */
  .alert{
    position:fixed;inset:0;z-index:50;
    display:none;
    background:radial-gradient(circle at 50% 40%, rgba(143,47,56,.55), rgba(0,0,0,.9));
    backdrop-filter:blur(2px);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .alert.show{display:block;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;}to{opacity:1;}}
  .alertCard{
    text-align:center;max-width:420px;width:100%;
    margin:0 auto;
    min-height:100dvh;
    display:flex;flex-direction:column;justify-content:center;
    padding:calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
  }
  .siren{
    font-size:38px;line-height:1;margin-bottom:4px;
    animation:shake .5s ease infinite;
  }
  @keyframes shake{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.12);}}
  .alertCard h2{
    margin:0 0 2px;font-size:24px;font-weight:900;letter-spacing:.02em;
    color:var(--gold2);text-shadow:0 3px 14px rgba(0,0,0,.7);
    animation:pulse 1s ease infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .alertCard .cart{font-size:34px;font-weight:900;color:var(--red2);margin:2px 0;}
  .thanks{
    margin:8px 0 12px;font-size:18px;font-weight:800;color:#fff;line-height:1.35;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .closeBtn{
    border:1px solid rgba(201,162,39,.5);border-radius:14px;
    background:linear-gradient(160deg,#c9a227,#a5851d);
    color:#1c1f26;font-weight:800;font-size:16px;letter-spacing:.05em;
    padding:14px 34px;cursor:pointer;
  }
  /* 어르신용 큼직한 종료 버튼 (터치영역 유지·세로만 축소) */
  .exitBtn{
    display:block;width:100%;max-width:360px;margin:12px auto 0;
    border:2px solid rgba(192,57,47,.7);border-radius:16px;
    background:linear-gradient(160deg,#c0392f 0%,#8f2f38 100%);
    color:#fff;font-weight:900;font-size:24px;letter-spacing:.04em;
    padding:18px 20px;cursor:pointer;
    box-shadow:0 10px 26px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s ease;
  }
  .exitBtn:active{transform:scale(.98);}
  /* 종료 안내 폴백 오버레이 */
  .goodbye{
    position:fixed;inset:0;z-index:80;
    display:none;align-items:center;justify-content:center;text-align:center;
    padding:28px;background:#0b0c10;
  }
  .goodbye.show{display:flex;}
  .goodbye .gbInner{max-width:520px;}
  .goodbye .gbIco{font-size:70px;line-height:1;margin-bottom:16px;}
  .goodbye h2{
    margin:0;color:var(--gold2);font-weight:900;line-height:1.5;
    font-size:clamp(30px,8vw,46px);letter-spacing:.02em;
    text-shadow:0 3px 14px rgba(0,0,0,.7);
  }
  .goodbye p{margin:18px 0 0;color:#cfd3dc;font-size:clamp(20px,5vw,28px);font-weight:700;line-height:1.5;}

  /* 기사 전화하기 목록 */
  .callList{
    margin:16px auto 0;max-width:420px;width:100%;
    border-top:1px solid rgba(255,255,255,.12);padding-top:14px;
    display:flex;flex-direction:column;gap:10px;
  }
  .callList .listTitle{color:var(--gold2);font-size:20px;font-weight:800;letter-spacing:.03em;}
  /* 두 기사 카드 좌우 나란히 */
  .driverRow{display:flex;flex-direction:row;gap:12px;}
  .driverCard{
    flex:1 1 0;min-width:0;
    background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:16px;
    padding:14px 10px;text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .driverCard .name{font-size:16px;font-weight:800;color:var(--text);line-height:1.35;}
  .driverCard .num{font-size:16px;font-weight:900;color:var(--gold2);letter-spacing:.02em;margin-top:6px;word-break:keep-all;}
  .telBtn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    width:100%;margin-top:12px;min-height:60px;
    border:2px solid rgba(201,162,39,.55);border-radius:14px;
    background:linear-gradient(160deg,#2e7d5b 0%,#256b4d 55%,#1c503a 100%);
    color:#fff;font-weight:900;font-size:20px;letter-spacing:.02em;
    padding:16px 8px;cursor:pointer;text-decoration:none;
    box-shadow:0 8px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s ease;
  }
  .telBtn:active{transform:scale(.98);}
  .telBtn .ico{font-size:22px;line-height:1;}

  /* 오늘 전화 대상 표시 (알림 안) */
  .calling{margin:4px 0 2px;font-size:15px;font-weight:800;color:var(--gold2);min-height:18px;
    text-shadow:0 2px 8px rgba(0,0,0,.5);}
  /* 격일제 근무 상태 (전화 카드 번호 밑) */
  .status{font-size:14px;font-weight:800;margin:4px 0 2px;letter-spacing:.02em;}
  .status.on{color:#3fbf6a;text-shadow:0 0 10px rgba(63,191,106,.35);}
  .status.off{color:#6b7180;opacity:.85;}

  /* 사장님 근무표 수정 진입 버튼(잠금) */
  .adminWrap{margin-top:16px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px;text-align:center;}
  .adminOpen{
    background:none;border:1px solid rgba(201,162,39,.4);border-radius:12px;
    color:var(--muted);font-size:14px;font-weight:700;padding:12px 18px;cursor:pointer;letter-spacing:.02em;
  }
  .adminOpen:active{transform:scale(.98);}
  /* 근무표 수정 오버레이 */
  .admin{position:fixed;inset:0;z-index:70;display:none;overflow-y:auto;
    background:rgba(10,11,14,.92);backdrop-filter:blur(2px);}
  .admin.show{display:block;}
  .adminCard{max-width:440px;width:100%;margin:0 auto;min-height:100dvh;
    display:flex;flex-direction:column;justify-content:center;
    padding:calc(18px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));text-align:center;}
  .adminTitle{font-size:24px;font-weight:900;color:var(--gold2);margin-bottom:16px;text-shadow:0 2px 10px rgba(0,0,0,.6);}
  .adminToday{font-size:16px;font-weight:800;color:var(--text);background:var(--card);
    border:1px solid rgba(201,162,39,.3);border-radius:12px;padding:12px;margin-bottom:16px;}
  .adminToday b{color:#3fbf6a;}
  .adminSection{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:14px;
    padding:16px 14px;margin-bottom:14px;text-align:left;}
  .adminLabel{font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:700;}
  .adminInput{width:100%;background:#12141a;border:1px solid rgba(201,162,39,.4);border-radius:12px;
    color:var(--text);font-size:20px;font-weight:700;padding:16px 14px;text-align:center;color-scheme:dark;}
  .adminPick{display:flex;gap:10px;}
  .pickBtn{flex:1;background:#1a1e28;border:2px solid #333;border-radius:12px;color:var(--text);
    font-size:16px;font-weight:800;padding:16px 8px;cursor:pointer;}
  .pickBtn.sel{border-color:var(--gold);background:#2a2410;color:var(--gold2);}
  .pickBtn:active{transform:scale(.97);}
  .adminBtnRow{display:flex;gap:10px;margin-top:14px;}
  .adminBtn{flex:1;border:none;border-radius:12px;font-size:17px;font-weight:800;padding:16px;cursor:pointer;letter-spacing:.03em;}
  .adminBtn.wide{width:100%;margin-top:14px;}
  .adminBtn.ok{background:linear-gradient(160deg,#c9a227,#a5851d);color:#1c1f26;}
  .adminBtn.cancel{background:#2a2f3d;color:var(--text);border:1px solid rgba(255,255,255,.12);}
  .adminBtn:active{transform:scale(.98);}
  .adminMsg{font-size:14px;font-weight:700;min-height:20px;margin-top:10px;color:#c0392f;}
  .adminMsg.good{color:#3fbf6a;}
  .exList{display:flex;flex-direction:column;gap:8px;}
  .exItem{display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:#12141a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;}
  .exItem .exDate{font-size:14px;font-weight:700;color:var(--text);}
  .exItem .exWho{font-size:13px;color:var(--gold2);font-weight:700;}
  .exDel{background:none;border:1px solid rgba(192,57,47,.6);border-radius:8px;color:#e07a72;
    font-size:13px;font-weight:700;padding:8px 12px;cursor:pointer;}
  .exEmpty{font-size:13px;color:var(--muted);text-align:center;padding:10px;}

  /* 히어로 이미지 (성별 선택 화면 상단) */
  .hero{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:6px;}
  .heroArt{width:min(78vw,300px);height:auto;display:block;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));}
  .heroTitle{font-size:30px;font-weight:900;letter-spacing:.1em;color:var(--gold2);
    text-shadow:0 2px 12px rgba(0,0,0,.6);}
  /* 한 화면에 다 담기 위해 로고는 작게 */
  .heroCompact{margin-bottom:2px;}
  .heroCompact .heroArt{width:min(40vw,140px);}
  .heroCompact .heroTitle{font-size:22px;}

  /* 상단 멘트 배너 */
  .notice{
    width:100%;text-align:center;
    background:linear-gradient(160deg,#33261a 0%,#241b12 100%);
    border:2px solid rgba(230,190,63,.7);border-radius:18px;
    padding:16px 16px;
    box-shadow:0 10px 26px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .noticeMain{font-size:21px;font-weight:900;color:var(--text);line-height:1.45;letter-spacing:.01em;}
  .noticeMain .cartBig{font-size:33px;color:var(--gold2);}
  .noticeSub{margin-top:8px;font-size:14px;font-weight:700;color:var(--muted);}
  /* 첫화면 인라인 기사 카드 영역 제목 */
  .frontListTitle{color:var(--gold2);font-size:17px;font-weight:800;letter-spacing:.03em;text-align:center;margin-top:2px;}
</style>

<div class="wrap">

  <!-- 첫화면 = 물량 콜 화면 (성별 선택 단계 제거 → 앱 열자마자 바로 승부) -->
  <section id="화면_물량" class="screen active">
    <!-- 히어로: 자체 제작 SVG(트럭+콜) — 저작권 안전, 화면에서 이미지 바로 확인 가능 -->
    <div class="hero heroCompact">
      <svg class="heroArt" viewBox="0 0 240 150" role="img" aria-label="기사콜 트럭 로고" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gCard" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#262b38"/><stop offset="1" stop-color="#171a22"/>
          </linearGradient>
          <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#e6be3f"/><stop offset="1" stop-color="#c9a227"/>
          </linearGradient>
        </defs>
        <rect x="1" y="1" width="238" height="148" rx="20" fill="url(#gCard)" stroke="#c9a227" stroke-opacity=".5"/>
        <!-- 트럭 -->
        <rect x="44" y="52" width="74" height="46" rx="4" fill="url(#gGold)"/>
        <path d="M118 98V60h20l22 16v22z" fill="#e6be3f"/>
        <path d="M126 64h9l14 11h-23z" fill="#171a22"/>
        <line x1="44" y1="104" x2="150" y2="104" stroke="#c9a227" stroke-width="3" stroke-linecap="round"/>
        <circle cx="66" cy="104" r="10" fill="#12141a"/><circle cx="66" cy="104" r="4.5" fill="#c0392f"/>
        <circle cx="140" cy="104" r="10" fill="#12141a"/><circle cx="140" cy="104" r="4.5" fill="#c0392f"/>
        <!-- 콜 배지 -->
        <circle cx="170" cy="104" r="26" fill="#8f2f38" stroke="#c9a227" stroke-width="2.5"/>
        <path d="M160 95c-2 6 1 13 6 18s12 8 18 6l-4-8-6 1-7-7 1-6z" fill="#e6be3f"/>
        <!-- 상단 골드 램프 -->
        <rect x="90" y="30" width="60" height="9" rx="4.5" fill="#c9a227"/>
      </svg>
      <div class="heroTitle">기사콜</div>
    </div>
    <!-- 상단 멘트 -->
    <div class="notice">
      <div class="noticeMain">안녕하세요 세탁기사입니다<br><span class="cartBig">16카트</span> 넘어요!</div>
      <div class="noticeSub">※ 15카트는 전화 안 하셔도 돼요</div>
    </div>

    <!-- 일하는 기사에게 바로 전화 (뒷장 카드를 첫화면으로 이동) -->
    <div class="frontListTitle">📞 일하는 기사님께 바로 전화</div>
    <div class="driverRow">
      <div class="driverCard">
        <div class="name">이기동 기사<br>(뚱땡이)</div>
        <div class="num">010-3805-9275</div>
        <div class="status" id="상태_이기동">&nbsp;</div>
        <a class="telBtn" href="tel:01038059275"><span class="ico">📞</span>전화</a>
      </div>
      <div class="driverCard">
        <div class="name">김종대 기사</div>
        <div class="num">010-3383-5808</div>
        <div class="status" id="상태_김종대">&nbsp;</div>
        <a class="telBtn" href="tel:01033835808"><span class="ico">📞</span>전화</a>
      </div>
    </div>

    <!-- 사장님용 근무표 수정 패널 (잠금) -->
    <div class="adminWrap">
      <button class="adminOpen" onclick="관리자열기()">🔒 근무표 수정 (사장님)</button>
    </div>

    <button class="exitBtn" onclick="앱종료()">종료하기</button>
  </section>
</div>

<!-- 근무표 수정 오버레이 -->
<div id="관리자" class="admin">
  <div class="adminCard">
    <!-- 비밀번호 단계 -->
    <div id="관리자_잠금">
      <div class="adminTitle">🔒 사장님 비밀번호</div>
      <input id="관리자_비번" class="adminInput" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="비밀번호 6자리" autocomplete="off">
      <div class="adminMsg" id="관리자_잠금msg">&nbsp;</div>
      <div class="adminBtnRow">
        <button class="adminBtn ok" onclick="관리자로그인()">확인</button>
        <button class="adminBtn cancel" onclick="관리자닫기()">닫기</button>
      </div>
    </div>
    <!-- 수정 단계 -->
    <div id="관리자_수정" style="display:none">
      <div class="adminTitle">근무표 수정</div>
      <div class="adminToday" id="관리자_오늘">오늘 근무: -</div>
      <div class="adminSection">
        <div class="adminLabel">날짜 선택</div>
        <input id="관리자_날짜" class="adminInput" type="date">
        <div class="adminLabel" style="margin-top:10px">그날 근무자</div>
        <div class="adminPick">
          <button class="pickBtn" id="pick_kim" onclick="근무자픽('kim')">김종대 기사</button>
          <button class="pickBtn" id="pick_lee" onclick="근무자픽('lee')">이기동 기사</button>
        </div>
        <button class="adminBtn ok wide" onclick="예외저장()">이 날짜 저장</button>
        <div class="adminMsg" id="관리자_수정msg">&nbsp;</div>
      </div>
      <div class="adminSection">
        <div class="adminLabel">저장된 예외 (이 폰에만 적용)</div>
        <div id="예외목록" class="exList"></div>
      </div>
      <button class="adminBtn cancel wide" onclick="관리자닫기()">닫기</button>
    </div>
  </div>
</div>

<!-- 종료 안내 폴백 오버레이 -->
<div id="종료안내" class="goodbye">
  <div class="gbInner">
    <div class="gbIco">👋</div>
    <h2>앱을 종료했습니다.<br>홈 버튼을 눌러 나가주세요.</h2>
    <p>오늘도 안전운행 하세요, 기사님!</p>
  </div>
</div>

<script>
  // ===== 근무 예외표: 격일제와 다르게 지정할 날짜만 여기에 추가하세요 =====
  // ★ 특정 날 근무자를 바꾸려면 아래 한 줄만 고치면 됩니다(모든 폰에 동일 반영).
  //   'YYYY-MM-DD'(한국날짜) : 'kim'(김종대) 또는 'lee'(이기동)
  var 예외근무 = {
    // 예) '2026-07-10': 'kim',   // 이기동 쉬는 날이라 김종대가 대신 근무
  };

  // ===== 한국시간(KST, UTC+9) 기준 오늘 날짜 (기기 시간대와 무관) =====
  function kst날짜(){
    var now = new Date();
    var utc = now.getTime() + now.getTimezoneOffset() * 60000; // 기기 로컬 → UTC
    var k = new Date(utc + 9 * 3600000);                       // UTC → KST
    var y = k.getFullYear(), m = k.getMonth(), d = k.getDate();
    var s = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    return { y:y, m:m, d:d, s:s, dateObj:new Date(y, m, d) };
  }

  // ===== 이 폰 전용 예외(localStorage) — 사장님 근무표 수정 패널이 저장하는 곳 =====
  // ※ 근무표 "설정" 저장에만 사용(버튼 누름 이력 저장 아님). 이 폰에서만 반영됨.
  var LS_예외키 = 'gisacall_예외근무';
  function 로컬예외로드(){
    try { return JSON.parse(localStorage.getItem(LS_예외키) || '{}') || {}; }
    catch(e){ return {}; }
  }
  function 로컬예외저장(map){
    try { localStorage.setItem(LS_예외키, JSON.stringify(map)); } catch(e){}
  }

  // ===== 오늘 근무자 판정 (KST 기준) =====
  // 우선순위: ① 이 폰 localStorage 예외 → ② 코드 하드코딩 예외근무 → ③ 기본 격일제(2026-07-05=김종대)
  function 근무자판정(dateStr, dateObj){
    var 로컬 = 로컬예외로드();
    if (로컬[dateStr] === 'kim' || 로컬[dateStr] === 'lee') return 로컬[dateStr];   // ①
    if (예외근무[dateStr]) return 예외근무[dateStr];                                 // ②
    var diff = Math.round((dateObj - new Date(2026, 6, 5)) / 86400000);              // ③
    return ((((diff % 2) + 2) % 2) === 0) ? 'kim' : 'lee';
  }
  function who객체(who){
    return who === 'kim'
      ? { key:'kim', name:'김종대 기사', tel:'01033835808' }
      : { key:'lee', name:'이기동 기사(뚱땡이)', tel:'01038059275' };
  }
  function 오늘근무자(){
    var k = kst날짜();
    return who객체(근무자판정(k.s, k.dateObj));
  }
  // ===== 전화 카드 아래 (일하는중)/(안하는중) 상태 자동 표시 =====
  function 상태갱신(){
    var 근무 = 오늘근무자();
    var 이 = document.getElementById('상태_이기동');
    var 김 = document.getElementById('상태_김종대');
    if (!이 || !김) return;
    var 이근무 = (근무.key === 'lee');
    이.textContent = 이근무 ? '(일하는중)' : '(안하는중)';
    김.textContent = 이근무 ? '(안하는중)' : '(일하는중)';
    이.className = 'status ' + (이근무 ? 'on' : 'off');
    김.className = 'status ' + (이근무 ? 'off' : 'on');
  }
  function 앱종료(){
    // 설치형(홈 화면 추가) PWA 감지
    var 설치형 = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                 || window.navigator.standalone === true;
    console.log("[기사콜] 종료 시도, 설치형(standalone):", 설치형);
    // 1순위: window.close(). 설치형이면 앱 창을 닫고 폰 홈 화면으로 복귀함.
    //  ※ 빈 페이지/다른 URL로 이동하는 폴백은 완전히 없앰 → 크롬 검색창이 뜨는 일 없음.
    try { window.close(); } catch(e){}
    // 창이 안 닫히는 일반 브라우저 탭이면: 어디로도 이동하지 말고 다크 종료 오버레이만 표시.
    //  (실제로 닫혔으면 이 타이머 실행 전에 창이 사라져 오버레이는 보이지 않음)
    setTimeout(function(){
      document.getElementById('종료안내').classList.add('show');
    }, 300);
  }
  // ===== 사장님 근무표 수정 패널 =====
  var 관리자비번 = "001234";
  var 픽선택 = "";   // 수정 화면에서 고른 근무자('kim'/'lee')

  function 관리자열기(){
    document.getElementById('관리자_잠금').style.display = '';
    document.getElementById('관리자_수정').style.display = 'none';
    document.getElementById('관리자_비번').value = '';
    document.getElementById('관리자_잠금msg').textContent = ' ';
    document.getElementById('관리자').classList.add('show');
    setTimeout(function(){ try{ document.getElementById('관리자_비번').focus(); }catch(e){} }, 100);
  }
  function 관리자닫기(){
    document.getElementById('관리자').classList.remove('show');
  }
  function 관리자로그인(){
    var v = document.getElementById('관리자_비번').value;
    var msg = document.getElementById('관리자_잠금msg');
    if (v === 관리자비번) {
      document.getElementById('관리자_잠금').style.display = 'none';
      document.getElementById('관리자_수정').style.display = '';
      var k = kst날짜();
      document.getElementById('관리자_날짜').value = k.s;   // 기본값 오늘
      픽선택 = 근무자판정(k.s, k.dateObj);
      픽갱신();
      수정화면갱신();
    } else {
      msg.textContent = '비밀번호가 틀립니다';
      document.getElementById('관리자_비번').value = '';
    }
  }
  function 근무자픽(who){ 픽선택 = who; 픽갱신(); }
  function 픽갱신(){
    document.getElementById('pick_kim').className = 'pickBtn' + (픽선택==='kim' ? ' sel' : '');
    document.getElementById('pick_lee').className = 'pickBtn' + (픽선택==='lee' ? ' sel' : '');
  }
  function 수정화면갱신(){
    var 근무 = 오늘근무자();
    var el = document.getElementById('관리자_오늘');
    var k = kst날짜();
    if (el) el.innerHTML = '오늘(' + k.s + ', 한국시간) 근무: <b>' + 근무.name + '</b>';
    예외목록렌더();
  }
  function 예외저장(){
    var 날짜 = document.getElementById('관리자_날짜').value;
    var msg = document.getElementById('관리자_수정msg');
    msg.className = 'adminMsg';
    if (!날짜) { msg.textContent = '날짜를 선택하세요'; return; }
    if (픽선택 !== 'kim' && 픽선택 !== 'lee') { msg.textContent = '근무자를 선택하세요'; return; }
    var map = 로컬예외로드();
    map[날짜] = 픽선택;
    로컬예외저장(map);
    msg.textContent = 날짜 + ' → ' + (픽선택==='kim'?'김종대':'이기동') + ' 기사 저장됨';
    msg.className = 'adminMsg good';
    수정화면갱신();
    상태갱신();          // 16카트 전화대상·(일하는중)/(안하는중) 즉시 반영
  }
  window.예외삭제 = function(날짜){
    var map = 로컬예외로드();
    delete map[날짜];
    로컬예외저장(map);
    수정화면갱신();
    상태갱신();
  };
  function 예외목록렌더(){
    var box = document.getElementById('예외목록');
    var map = 로컬예외로드();
    var keys = Object.keys(map).sort();
    if (keys.length === 0) { box.innerHTML = '<div class="exEmpty">저장된 예외 없음 (기본 격일제로 동작)</div>'; return; }
    var html = '';
    keys.forEach(function(날짜){
      var 이름 = map[날짜]==='kim' ? '김종대 기사' : '이기동 기사';
      html += '<div class="exItem"><span class="exDate">' + 날짜 + '</span>'
            + '<span class="exWho">' + 이름 + '</span>'
            + '<button class="exDel" onclick="예외삭제(\'' + 날짜 + '\')">삭제</button></div>';
    });
    box.innerHTML = html;
  }

  // 격일제 상태 자동 전환: 최초 + 60초마다 + 다시 포커스 시 재계산(자정 넘김·앱 상시 켜둠 대비)
  상태갱신();
  setInterval(상태갱신, 60000);
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden) 상태갱신();
  });

  // 서비스워커 등록: 설치형 PWA 요건 충족 → 홈 화면 추가 시 주소창 없는 전체화면
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('서비스워커.js').catch(function(){});
    });
  }
</script>
